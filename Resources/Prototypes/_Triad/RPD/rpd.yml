# Triad: RPD port from funky-station (PR #62 + #1244 + #1338 + #1458 + #1289, see also Monolith PR #3930).
# Radial icons reference the actual constructed entity's RSI so any sprite swap in the fork's atmos
# hardware automatically propagates to the picker — funky's pre-rendered Textures/Interface/Radial/RPD/
# icons removed.
# Fractional cost (cost: 0.5) was rounded to 1 because RCDPrototype.Cost is int upstream; RPD maxCharges
# was halved to 45 to preserve effective build count (90 pipe segments per charge after halving).
# HeatPump and GasTemperatureGate omitted because their prototypes aren't in this fork yet.

- type: rcd
  id: PipeFourway
  category: Piping
  sprite:
    sprite: Structures/Piping/Atmospherics/pipe.rsi
    state: pipeFourway
  mode: ConstructObject
  prototype: GasPipeFourway
  cost: 1
  delay: 0
  rotation: User
  fx: EffectRCDConstruct0

