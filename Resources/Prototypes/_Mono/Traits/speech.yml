# 1 Cost

# Triad: Bogan accent, display name overridden to "Dustkin" (trait-dustkin-accent-name); vocab enriched
- type: trait
  id: BoganAccent
  name: trait-dustkin-accent-name
  description: trait-dustkin-accent-desc
  category: Accents
  cost: 1 # Triad: dialect accent; 1 from the Accents point pool (one dialect max).
  conditions:
  # Triad: Yowie speak Bogan natively (BaseMobYowie carries BoganAccent), so taking it as a trait is redundant.
  - !type:IsSpeciesCondition
    species: Yowie
    invert: true
  - !type:HasFreeAccentSlotCondition # Triad: Dwarf/Goblin must clear their native accent (Accentless) first
  effects:
  - !type:AddCompsEffect
    components:
    - type: BoganAccent
# End Triad

# Triad: Russian accent, display name overridden to "Terra Slavic" (trait-terraslavic-name); vocab enriched
- type: trait
  id: RussianAccent
  name: trait-terraslavic-name
  description: trait-terraslavic-desc
  category: Accents
  cost: 1 # Triad: dialect accent; 1 from the Accents point pool (one dialect max).
  conditions:
  - !type:HasFreeAccentSlotCondition # Triad: Dwarf/Goblin must clear their native accent (Accentless) first
  effects:
  - !type:AddCompsEffect
    components:
    - type: RussianAccent
# End Triad

# Triad: lighter "slight" Terra Slavic (faux-Cyrillic kept, clipping dialed down). Same cost as thick.
- type: trait
  id: RussianAccentSlight
  name: trait-terraslavic-mild-name
  description: trait-terraslavic-mild-desc
  category: Accents
  cost: 1
  conditions:
  - !type:HasFreeAccentSlotCondition # Triad: Dwarf/Goblin must clear their native accent (Accentless) first
  effects:
  - !type:AddCompsEffect
    components:
    - type: RussianAccent
      strength: Slight
# End Triad

