## If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

# Triad: Pirate accent, enriched + display name overridden to "Freeport Corsair"
# (trait-freeportcorsair-accent-name). Kept the upstream PirateAccent id/component for portability and
# so the cursed cutlass, pirate uniforms, and pet NPC share the enriched accent.
- type: trait
  id: PirateAccent
  name: trait-freeportcorsair-accent-name
  description: trait-freeportcorsair-accent-desc
  category: Accents
  cost: 1 # Triad: dialect accent; 1 from the Accents point pool (one dialect max).
  conditions:
  - !type:HasFreeAccentSlotCondition # Triad: Dwarf/Goblin must clear their native accent (Accentless) first
  effects:
  - !type:AddCompsEffect
    components:
    - type: PirateAccent
# End Triad

