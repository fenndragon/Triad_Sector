- type: trait
  id: DwarvenBrogue # Triad: merged the near-identical Scottish + Dwarf accents into one brogue
  name: trait-dwarven-brogue-name
  description: trait-dwarven-brogue-desc
  category: Accents
  cost: 1 # Triad: dialect accent; 1 from the Accents point pool. (Grants a BagpipeInstrument; that item is flavor, not the cost.)
  conditions:
  # Triad: Dwarves speak the brogue natively, so never re-take it. Other heavy-native species (Goblin) need
  # Accentless first so two dialects don't stack.
  - !type:IsSpeciesCondition
    species: Dwarf
    invert: true
  - !type:HasFreeAccentSlotCondition
  effects:
  - !type:AddCompsEffect
    components:
    - type: DwarfAccent
  - !type:SpawnItemInHandEffect # Triad: keep the bagpipe
    item: BagpipeInstrument

# Triad: lighter "slight" Dwarven Brogue. Same cost as thick (no bagpipe on the mild version).
- type: trait
  id: DwarvenBrogueSlight
  name: trait-dwarven-brogue-mild-name
  description: trait-dwarven-brogue-mild-desc
  category: Accents
  cost: 1
  conditions:
  # Triad: same gate as any dialect; a Dwarf takes the mild brogue only after Accentless clears their native
  # one. Accentless is cost 0, so it applies first (cheapest-first order) and removes the native thick
  # DwarfAccent before this slight one is added.
  - !type:HasFreeAccentSlotCondition # Triad: Dwarf/Goblin must clear their native accent (Accentless) first
  effects:
  - !type:AddCompsEffect
    components:
    - type: DwarfAccent
      strength: Slight
# End Triad

