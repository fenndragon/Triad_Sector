  cost: 0 # Triad: free speech modifier (post-layer stutter), not a paid dialect; rides alongside one dialect.
  effects:
  - !type:AddCompsEffect
    components:
    - type: StutteringAccent
      matchRandomProb: 0.1
      fourRandomProb: 0
      threeRandomProb: 0
      cutRandomProb: 0

