- type: trait
  id: Accentless
  name: trait-accentless-name
  description: trait-accentless-desc
  category: Accents
  cost: 0 # Triad: free modifier (removes a species accent), not a paid dialect.
  effects:
  - !type:AddCompsEffect
    components:
    - type: Accentless
      removes:
      - type: GoblinAccent # Frontier
      - type: LizardAccent
      - type: MothAccent
      - type: DwarfAccent

- type: trait
