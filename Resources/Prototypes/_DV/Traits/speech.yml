# Triad: Muted is a speech DISABILITY, not an accent. Recategorized to Disabilities (free, and correctly
# independent of LANGUAGES: a mute character still understands languages, they just can't speak aloud).
- type: trait
  id: Muted
  name: trait-muted-name
  description: trait-muted-desc
  category: Disabilities
  cost: 0
  conditions:
  # Triad: restore the BorgChassis exclusion the Real Traits port dropped (was a component blacklist).
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  # Triad: a mute character can't speak, so no accent (or Stutter/Frontal Lisp, also Accents-category) should
  # apply. Category-level gate so any accent added later is covered automatically, no per-accent maintenance.
  - !type:HasTraitInCategoryCondition
    category: Accents
    invert: true
    tooltip: trait-condition-muted-no-accents
  effects:
  - !type:AddCompsEffect
    components:
    - type: Muted

